[build]
  command = "npm run build"
  publish = ".next"

# Proxy /api/* requests to the Python backend (avoids CORS issues)
# Replace this URL with your backend's deployment URL once it's live
[[redirects]]
  from = "/api/*"
  to = "https://dummyproject.up.railway.app/api/:splat"
  status = 200
  force = true
